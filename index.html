    /* цвета */
        :root {
            --gold: #d4af37; /* золотой цвет. вместо ргб циферок можно использовать сокращённые, тут например --gold
            свои также можете делать */
            --gold-light: #f3e5ab; /* светлое золото */

        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--dark-bg);
            color: #ffffff;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;

        /* тут должна быть анимация фона но она не работает */

        .glow-background {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150vw;
            height: 150vh;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, rgba(10, 10, 10, 0) 60%);
            z-index: -1;
            pointer-events: none;
            animation: pulseGlow 6s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.7; transform: translate(-50%, -50%) scale(0.95); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 2rem 1rem;
            box-sizing: border-box;
            min-height: 100vh;

        header {

        .logo {

            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.4));
            transition: filter 0.3s ease;
        }

        .logo:hover {
            filter: drop-shadow(0 0 35px rgba(212, 175, 55, 0.7));
        }

        .buttons-wrapper {
            margin-top: auto;
            margin-bottom: 3rem;
            display: flex;
            flex-direction: column; /* кнопки будут в столбик */
            gap: 20px;
            align-items: center;
            width: 100%;
            max-width: 450px;

        /* обычная кнопка для соцсетей */
        .solar-btn {
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            padding: 15px 30px;
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid var(--gold);
            color: var(--gold);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 50px;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
            transition: background 0.3s, color 0.3s, box-shadow 0.3s, transform 0.3s;
        }

        /* кнопка табия */
        .solar-btn-green {

            если кликнуть на цветной квадрат */
            border: 1px solid rgba(0, 255, 21, 0.8);
            color: var(--bleak);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 50px;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 15px rgba(16, 156, 1, 0.1);
            transition: background 0.3s, color 0.3s, box-shadow 0.3s, transform 0.3s;
        }

        /* эффекты при наведении */
        .solar-btn-green:hover {
            background: rgba(0, 133, 11, 0.8);
            color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
            transform: scale(1.05);
            z-index: 10;
        }

        .solar-btn:hover {
            background: var(--gold);
            color: var(--dark-bg);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
            transform: scale(1.05);
            z-index: 10;
        }

        /* золотая кнопка */
        .solar-btn.highlight {
            background: var(--gold);
            color: var(--dark-bg);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .solar-btn.highlight:hover {
            background: var(--gold-light);
            color: var(--dark-bg);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.7);
        }

        /* кнопка spotlight в углу */
        .spotlight-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid var(--gold);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            backdrop-filter: blur(4px);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
            transition: all 0.3s ease;
            z-index: 50;
        }

        .spotlight-btn svg {
            width: 22px;
            height: 22px;
        }

        /* ховер */
        .spotlight-btn:hover {
            background: var(--gold);
            color: var(--dark-bg);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
            transform: scale(1.1);
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.9rem;
            color: #888;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        .credit-link {
            color: var(--gold-light);
            text-decoration: none;
            transition: color 0.3s;
        }

        .credit-link:hover {
            color: #fff;
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .solar-btn {
                width: 90%;
            }
            .spotlight-btn {
                top: 15px;
                right: 15px;
                width: 40px;
                height: 40px;
            }
            .spotlight-btn svg {
                width: 18px;
                height: 18px;
            }
        }
    </style>
</head>
