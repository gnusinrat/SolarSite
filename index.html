<!DOCTYPE html>

<head>

    <style>
    /* цвета */
        :root {
            --gold: #d4af37; /* золотой цвет. вместо ргб циферок можно использовать сокращённые, тут например --gold
            свои также можете делать */
            --gold-light: #f3e5ab; /* светлое золото */
            --dark-bg: #0a0a0a;
            --vsky-purple: #7700FF;
        }

        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--dark-bg);
            color: #ffffff;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* тут должна быть анимация фона но она не работает */
        /* зато логотип пульсирует при наведении, но я не думаю что это зависит от этой функции */
        /* PS. не зависит. нашёл отдельную функцию для пульса лого */
        .glow-background {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150vw;
            height: 150vh;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, rgba(10, 10, 10, 0) 60%);
            z-index: -1;
            pointer-events: none;
            animation: pulseGlow 6s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.7; transform: translate(-50%, -50%) scale(0.95); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 2rem 1rem;
            box-sizing: border-box;
            min-height: 100vh;
        }

        header {
            margin-top: 2rem;
            text-align: center;
        }

        /* вот та функция для лого */
        .logo {
            max-width: 350px;
            width: 90%;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.4));
            transition: filter 0.3s ease;
        }

        .logo:hover {
            filter: drop-shadow(0 0 35px rgba(212, 175, 55, 0.7));
        }

        .buttons-wrapper {
            margin-top: auto;
            margin-bottom: 3rem;
            display: flex;
            flex-direction: column; /* кнопки будут в столбик */
            gap: 20px;
            align-items: center;
            width: 100%;
            max-width: 450px;
        }

        /* обычная кнопка для соцсетей */
        .solar-btn {
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            padding: 15px 30px;
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid var(--gold);
            color: var(--gold);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 50px;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
            transition: background 0.3s, color 0.3s, box-shadow 0.3s, transform 0.3s;
        }

        /* кнопка табия */
        .solar-btn-green {
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            padding: 15px 30px;
            background: rgba(0, 255, 21, 0.6); /* <-- цвета типо таких можно менять без использования ргб 
            если кликнуть на цветной квадрат */
            border: 1px solid rgba(0, 255, 21, 0.8);
            color: var(--bleak);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 50px;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 15px rgba(16, 156, 1, 0.1);
            transition: background 0.3s, color 0.3s, box-shadow 0.3s, transform 0.3s;
            cursor: pointer;
        }

        /* эффекты при наведении */
        .solar-btn-green:hover {
            background: rgba(0, 133, 11, 0.8);
            color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
            transform: scale(1.05);
            z-index: 10;
        }

        .solar-btn:hover {
            background: var(--gold);
            color: var(--dark-bg);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
            transform: scale(1.05);
            z-index: 10;
        }

        /* золотая кнопка */
        .solar-btn.highlight {
            background: var(--gold);
            color: var(--dark-bg);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .solar-btn.highlight:hover {
            background: var(--gold-light);
            color: var(--dark-bg);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.7);
        }

        /* кнопка ЧАВО и кнопка НОВОСТИ */
        .faq-top-btn, .news-top-btn {
            position: absolute;
            top: 20px;
            height: 45px;
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid var(--gold);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            text-decoration: none;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
            transition: all 0.3s ease;
            z-index: 50;
            padding: 0 15px;
            gap: 8px;
            font-weight: bold;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .faq-top-btn {
            left: 20px;
        }

        .news-top-btn {
            right: 20px;
        }

        .faq-top-btn svg, .news-top-btn svg {
            width: 20px;
            height: 20px;
        }

        /* ховер */
        .faq-top-btn:hover, .news-top-btn:hover {
            background: var(--gold);
            color: var(--dark-bg);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
            transform: scale(1.1);
        }

        /* --- Стили для модального окна (поп-апа) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            
            /* Настройки для плавной анимации */
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--dark-bg);
            border: 1px solid var(--gold);
            padding: 2rem;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            
            /* Эффект выныривания снизу */
            transform: translateY(40px) scale(0.9);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .modal-title {
            color: #ffb433; /* не аггресируй */
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .modal-text {
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 2rem;
            color: #ddd;
        }

        .modal-text strong {
            color: var(--gold);
        }

        .modal-buttons-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-btn {
            padding: 15px;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .modal-btn-confirm {
            background: rgba(0, 255, 21, 0.6);
            border: 1px solid rgba(0, 255, 21, 0.8);
            color: #fff;
        }

        .modal-btn-confirm:hover {
            background: rgba(0, 133, 11, 0.8);
            box-shadow: 0 0 15px rgba(0, 255, 21, 0.4);
            transform: scale(1.02);
        }

        .modal-btn-cancel {
            background: transparent;
            border: 1px solid #555;
            color: #aaa;
        }

        .modal-btn-cancel:hover {
            border-color: #fff;
            color: #fff;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.9rem;
            color: #888;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        .credit-link {
            color: var(--gold-light);
            text-decoration: none;
            transition: color 0.3s;
        }

        .credit-link:hover {
            color: #fff;
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .solar-btn {
                width: 90%;
            }
            .faq-top-btn, .news-top-btn {
                top: 15px;
                height: 40px;
                padding: 0 10px;
                font-size: 0.8rem;
            }
            .faq-top-btn {
                left: 15px;
            }
            .news-top-btn {
                right: 15px;
            }
            .faq-top-btn svg, .news-top-btn svg {
                width: 16px;
                height: 16px;
            }
        }
    </style>
</head>
<body>

    <!-- скрипт для работы поп-апа -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ticketBtn = document.getElementById('tabiaTicketBtn');
            const modal = document.getElementById('ticketModal');
            const confirmBtn = document.getElementById('modalConfirmBtn');
            const cancelBtn = document.getElementById('modalCancelBtn');
            
            // Если кнопка билета сейчас убрана с сайта, предотвращаем ошибку скрипта
            if (ticketBtn) {
                // ссылка на оплату берется из дата-атрибута
                const paymentUrl = ticketBtn.getAttribute('data-url');

                // при клике на кнопку билетов - показываем модалку
                ticketBtn.addEventListener('click', (e) => {
                    e.preventDefault(); // останавливаем обычный переход по ссылке
                    modal.classList.add('active');
                });

                // при клике на перейти к покупке открываем ссылку
                confirmBtn.addEventListener('click', () => {
                    modal.classList.remove('active');
                    window.open(paymentUrl, '_blank');
                });
            }

            // при клике на "Отмена" - просто закрываем модалку
            if (cancelBtn) {
                cancelBtn.addEventListener('click', () => {
                    modal.classList.remove('active');
                });
            }

            // закрываем модалку, если кликнуть по темному фону вокруг неё
            if (modal) {
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        modal.classList.remove('active');
                    }
                });
            }
        });
    </script>
